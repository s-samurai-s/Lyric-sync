name: Build Windows exe

# Builds LyricSyncPlayer.exe on a Windows runner in the cloud —
# useful if you don't have access to an actual Windows machine.
#
# Once pushed, this runs automatically. Download the finished exe from:
#   repo -> Actions tab -> latest run -> Artifacts -> LyricSyncPlayer-windows

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pyinstaller pygame

      - name: Build exe
        run: |
          pyinstaller --onefile --console --name LyricSyncPlayer lyric_sync.py

      - name: Bundle sample media alongside the exe
        run: |
          New-Item -ItemType Directory -Force -Path dist\media
          Copy-Item media\sample.lrc dist\media\sample.lrc -Force

      - name: Upload exe + sample as one artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricSyncPlayer-windows
          path: |
            dist/LyricSyncPlayer.exe
            dist/media/sample.lrc
